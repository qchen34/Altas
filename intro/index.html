  <style>
/* ============ Atlas BP — Mobile Cinematic Site ============ */

:root {
  --bg: #000005;
  --bg-deep: #02030a;
  --bg-soft: #08091a;
  --fg: #f4f5fb;
  --fg-dim: rgba(244, 245, 251, 0.62);
  --fg-faint: rgba(244, 245, 251, 0.32);
  --line: rgba(244, 245, 251, 0.12);
  --line-strong: rgba(244, 245, 251, 0.22);
  --accent: #7B9EFF;
  --accent-soft: rgba(123, 158, 255, 0.18);
  --accent-glow: rgba(123, 158, 255, 0.55);
  --warn: #FFB87A;

  --font-serif: 'PingFang SC', 'PingFang TC', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'IBM Plex Mono', 'Menlo', 'Courier New', monospace;

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-serif);
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overscroll-behavior: none;
  text-rendering: optimizeLegibility;
}

body {
  min-height: 100vh;
  overflow-x: hidden;
  letter-spacing: 0.01em;
  line-height: 1.7;
}

/* ============ Background layers ============ */

.bg-stars,
.bg-grid,
.bg-vignette {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.bg-stars { z-index: 0; }

.bg-grid {
  background-image:
    linear-gradient(rgba(123, 158, 255, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(123, 158, 255, 0.06) 1px, transparent 1px);
  background-size: 64px 64px;
  background-position: center;
  mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, transparent 75%);
  z-index: 1;
  opacity: 0.6;
}

.bg-vignette {
  background:
    radial-gradient(ellipse at center top, transparent 0%, rgba(0,0,5,0.55) 60%, rgba(0,0,5,0.95) 100%);
  z-index: 2;
}

/* ============ Top HUD (timecode + chapter) ============ */

.hud-top {
  position: fixed;
  top: calc(var(--safe-top) + 14px);
  left: 16px;
  right: 16px;
  z-index: 50;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--fg-faint);
  text-transform: uppercase;
  pointer-events: none;
  mix-blend-mode: screen;
}

.hud-top .left,
.hud-top .right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.hud-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: scale(0.85); }
  50% { opacity: 1; transform: scale(1); }
}

/* ============ Bottom subtitle bar ============ */

.subtitle-bar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 50;
  padding: 14px 20px calc(14px + var(--safe-bottom));
  background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.0));
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--fg-dim);
  pointer-events: none;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 16px;
}

.subtitle-bar .ch-num {
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}

.subtitle-bar .ch-title {
  color: var(--fg);
  letter-spacing: 0.16em;
  text-align: right;
  max-width: 60%;
  font-family: var(--font-serif);
  font-weight: 400;
  font-size: 11px;
  text-transform: none;
}

.progress-rail {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  height: 1px;
  background: rgba(255,255,255,0.05);
  z-index: 51;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, transparent, var(--accent) 50%, transparent);
  width: 0%;
  transition: width 0.1s linear;
  box-shadow: 0 0 10px var(--accent-glow);
}

/* letterbox */
.letterbox-top,
.letterbox-bottom {
  position: fixed;
  left: 0;
  right: 0;
  height: 32px;
  background: #000;
  z-index: 49;
  pointer-events: none;
}
.letterbox-top { top: 0; }
.letterbox-bottom { bottom: 0; }

/* ============ Main scroller ============ */

.stage {
  position: relative;
  z-index: 10;
}

.scene {
  position: relative;
  min-height: 100vh;
  padding: 96px 24px 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  z-index: 10;
}

/* generic typography inside scenes */
.eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.eyebrow::before {
  content: "";
  width: 24px;
  height: 1px;
  background: var(--accent);
  display: inline-block;
  box-shadow: 0 0 8px var(--accent-glow);
}

h1.title-cn {
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: clamp(44px, 12vw, 80px);
  line-height: 1.05;
  letter-spacing: 0.04em;
  margin: 0 0 24px;
  color: var(--fg);
}

h2.title-cn {
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: clamp(32px, 8vw, 52px);
  line-height: 1.15;
  letter-spacing: 0.03em;
  margin: 0 0 20px;
}

.title-en {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--fg-dim);
  margin-bottom: 20px;
}

.body-cn {
  font-family: var(--font-serif);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.85;
  color: var(--fg);
  letter-spacing: 0.02em;
  text-wrap: pretty;
}

.body-cn p { margin: 0 0 18px; }

.body-cn em {
  color: var(--accent);
  font-style: normal;
  font-weight: 500;
}

.body-cn strong {
  color: var(--fg);
  font-weight: 500;
  border-bottom: 1px solid var(--accent-soft);
  padding-bottom: 1px;
}

.quote {
  font-family: var(--font-serif);
  font-style: normal;
  font-weight: 400;
  font-size: 18px;
  line-height: 1.7;
  color: var(--fg);
  letter-spacing: 0.02em;
  border-left: 1px solid var(--accent);
  padding: 4px 0 4px 18px;
  margin: 28px 0;
  position: relative;
}

.quote .en {
  font-family: var(--font-mono);
  font-style: normal;
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--fg-dim);
  display: block;
  margin-top: 12px;
  line-height: 1.6;
}

/* mono labels */
.mono {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--fg-dim);
}

.coord {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--fg-faint);
  text-transform: uppercase;
}

/* divider */
.div-line {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 32px 0;
  color: var(--fg-faint);
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

.div-line::before,
.div-line::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--line);
}

/* ============ scene reveal animation ============ */

.reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 1.2s cubic-bezier(0.2, 0.7, 0.2, 1),
              transform 1.2s cubic-bezier(0.2, 0.7, 0.2, 1);
  transition-delay: var(--rd, 0ms);
}
.reveal.in {
  opacity: 1;
  transform: translateY(0);
}

.fade-only {
  opacity: 0;
  transition: opacity 1.6s ease-out;
  transition-delay: var(--rd, 0ms);
}
.fade-only.in { opacity: 1; }

.blur-in {
  opacity: 0;
  filter: blur(12px);
  transform: translateY(20px);
  transition: opacity 1.4s ease-out, filter 1.4s ease-out, transform 1.4s ease-out;
  transition-delay: var(--rd, 0ms);
}
.blur-in.in {
  opacity: 1;
  filter: blur(0);
  transform: translateY(0);
}

/* type-on (subtitle effect) */
.typeon {
  display: inline-block;
  border-right: 1px solid var(--accent);
  white-space: pre-wrap;
  overflow: hidden;
  width: 0;
  transition: width 2.4s steps(40, end);
  vertical-align: bottom;
}
.typeon.in { width: 100%; border-right-color: transparent; }

/* ============ Specific scenes ============ */

/* --- Hero / countdown --- */
.scene-hero {
  min-height: 100svh;
  align-items: center;
  text-align: center;
  padding: 0 24px;
  overflow: hidden;
}

.countdown {
  font-family: var(--font-mono);
  font-size: 72px;
  font-weight: 300;
  color: var(--accent);
  text-shadow: 0 0 24px var(--accent-glow);
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
  margin-bottom: 36px;
}

.hero-mark {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--fg-dim);
  margin-bottom: 28px;
}

.hero-tagline {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 18px;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-weight: 400;
}
.hero-tagline::before, .hero-tagline::after {
  content: "";
  width: 18px;
  height: 1px;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
}

.hero-title {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: clamp(64px, 18vw, 120px);
  letter-spacing: 0.06em;
  line-height: 1;
  margin: 0;
  background: linear-gradient(180deg, #fff 0%, var(--accent) 130%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 28px rgba(123,158,255,0.18));
}

.hero-sub {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--fg-dim);
  margin-top: 24px;
}

.hero-byline {
  position: absolute;
  bottom: 136px;
  left: 0;
  right: 0;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--fg-faint);
  text-transform: uppercase;
}

.hero-quote {
  margin-top: 48px;
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 16px;
  line-height: 1.8;
  color: var(--fg-dim);
  max-width: 320px;
  margin-left: auto;
  margin-right: auto;
}

.hero-quote .en {
  display: block;
  font-family: var(--font-mono);
  font-style: normal;
  font-size: 11px;
  letter-spacing: 0.16em;
  color: var(--fg-faint);
  text-transform: uppercase;
  margin-top: 14px;
  line-height: 1.6;
}

.scroll-hint {
  position: absolute;
  bottom: 56px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--fg-faint);
  text-transform: uppercase;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  animation: hover 2.6s ease-in-out infinite;
}

.scroll-hint::after {
  content: "";
  width: 1px;
  height: 28px;
  background: linear-gradient(to bottom, var(--accent), transparent);
}

@keyframes hover {
  0%, 100% { transform: translate(-50%, 0); opacity: 0.7; }
  50% { transform: translate(-50%, 6px); opacity: 1; }
}

/* --- Moments (chapter 1) --- */
.moment-card {
  position: relative;
  border-top: 1px solid var(--line);
  padding: 28px 0 0;
  margin-bottom: 36px;
}

.moment-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 18px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

.moment-head .timestamp {
  color: var(--accent);
}

.moment-head .role {
  color: var(--fg-faint);
}

.moment-card h3 {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: 22px;
  line-height: 1.4;
  color: var(--fg);
  margin: 0 0 12px;
  letter-spacing: 0.02em;
}

/* --- Definition card --- */
.def-card {
  border: 1px solid var(--line-strong);
  padding: 28px 22px;
  margin: 28px 0;
  background: linear-gradient(180deg, rgba(123,158,255,0.04), rgba(0,0,0,0.6));
  position: relative;
}

.def-card::before,
.def-card::after {
  content: "";
  position: absolute;
  width: 14px;
  height: 14px;
  border: 1px solid var(--accent);
}
.def-card::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
.def-card::after { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

.def-card .label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
}

.def-card .text {
  font-family: var(--font-serif);
  font-size: 18px;
  line-height: 1.7;
  font-weight: 400;
  color: var(--fg);
  letter-spacing: 0.02em;
}

/* --- Composition list (chapter 3) --- */
.compo-row {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 16px;
  padding: 18px 0;
  border-bottom: 1px solid var(--line);
  align-items: baseline;
}
.compo-row:last-child { border-bottom: 0; }

.compo-row .id {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--fg-faint);
  text-transform: uppercase;
  width: 28px;
}

.compo-row .name {
  font-family: var(--font-serif);
  font-weight: 500;
  color: var(--fg);
  font-size: 16px;
  margin-bottom: 4px;
}

.compo-row .name em {
  font-style: normal;
  color: var(--accent);
}

.compo-row .desc {
  font-family: var(--font-serif);
  font-weight: 300;
  font-size: 14px;
  color: var(--fg-dim);
  line-height: 1.6;
}

/* --- Why now (chapter 4) — three pillars --- */
.pillar {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 16px;
  padding: 24px 0;
  border-top: 1px solid var(--line);
}
.pillar:last-child { border-bottom: 1px solid var(--line); }

.pillar .num {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--accent);
  padding-top: 4px;
  text-transform: uppercase;
}

.pillar .name {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: 18px;
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}

.pillar .desc {
  font-family: var(--font-serif);
  font-weight: 300;
  font-size: 14px;
  color: var(--fg-dim);
  line-height: 1.7;
}

/* --- Users (chapter 5) — three persona cards --- */
.persona {
  margin: 36px 0;
  padding-top: 24px;
  border-top: 1px solid var(--line);
}

.persona-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}

.persona-head .tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.24em;
  color: var(--accent);
  text-transform: uppercase;
}

.persona-head .role-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--fg-faint);
  text-transform: uppercase;
}

.persona h3 {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: 24px;
  letter-spacing: 0.02em;
  margin: 0 0 14px;
}

.persona-section {
  margin-top: 18px;
}

.persona-section .ttl {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--fg-faint);
  margin-bottom: 10px;
}

.persona-list {
  list-style: none;
  padding: 0;
  margin: 0;
  font-family: var(--font-serif);
  font-weight: 300;
  font-size: 14px;
  line-height: 1.7;
  color: var(--fg);
}

.persona-list li {
  padding: 6px 0 6px 18px;
  position: relative;
}

.persona-list li::before {
  content: "·";
  color: var(--accent);
  position: absolute;
  left: 0;
  font-size: 18px;
  line-height: 1;
  top: 8px;
}

.persona-list li em {
  font-style: normal;
  color: var(--accent);
}

/* --- Three product moments (chapter 6) — film stills --- */
.still {
  position: relative;
  margin: 36px 0;
  border: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(123,158,255,0.03), rgba(0,0,0,0.6));
  padding: 24px 22px 22px;
}

.still-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
}

.still-head .id { color: var(--accent); }
.still-head .meta { color: var(--fg-faint); }

.still-frame {
  aspect-ratio: 16 / 9;
  border: 1px solid var(--line);
  background:
    repeating-linear-gradient(45deg,
      rgba(123,158,255,0.04) 0 6px,
      rgba(0,0,0,0) 6px 12px);
  position: relative;
  margin-bottom: 18px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.still-frame .frame-tag {
  position: absolute;
  top: 8px;
  left: 8px;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.2em;
  color: var(--fg-faint);
  text-transform: uppercase;
}

.still-frame .frame-corners::before,
.still-frame .frame-corners::after,
.still-frame::before,
.still-frame::after {
  content: "";
  position: absolute;
  width: 10px;
  height: 10px;
  border-color: var(--accent);
}
.still-frame::before { top: 6px; right: 6px; border-top: 1px solid; border-right: 1px solid; }
.still-frame::after { bottom: 6px; left: 6px; border-bottom: 1px solid; border-left: 1px solid; }

.still-frame .preview-glyph {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.24em;
  color: var(--fg-faint);
  text-transform: uppercase;
}

.still h3 {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: 18px;
  margin: 0 0 12px;
  letter-spacing: 0.02em;
}

.still p {
  font-family: var(--font-serif);
  font-weight: 300;
  font-size: 14px;
  line-height: 1.75;
  color: var(--fg-dim);
  margin: 0;
}

.still p em {
  font-style: normal;
  color: var(--accent);
}

/* in-frame illustrative content */
.frame-dashboard {
  width: 80%;
  height: 70%;
  border: 1px solid var(--line-strong);
  background: rgba(0,0,0,0.4);
  display: grid;
  grid-template-rows: auto 1fr;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.16em;
  color: var(--fg-dim);
  text-transform: uppercase;
}
.frame-dashboard .top { padding: 6px 8px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; }
.frame-dashboard .top .ok { color: var(--accent); }
.frame-dashboard .body { padding: 8px; display: flex; gap: 10px; align-items: flex-end; }
.frame-dashboard .bar {
  width: 8px;
  background: var(--accent);
  opacity: 0.85;
  box-shadow: 0 0 8px var(--accent-glow);
}

.frame-search {
  width: 80%;
  display: flex;
  flex-direction: column;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--fg-dim);
  letter-spacing: 0.12em;
}
.frame-search .input {
  border: 1px solid var(--accent);
  padding: 8px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--fg);
  background: rgba(123,158,255,0.06);
}
.frame-search .input::after {
  content: "▮";
  color: var(--accent);
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }
.frame-search .result {
  border: 1px solid var(--line);
  padding: 8px 10px;
  display: flex;
  justify-content: space-between;
  text-transform: uppercase;
}
.frame-search .result .cta { color: var(--accent); }

.frame-newsletter {
  width: 84%;
  border: 1px solid var(--line);
  font-family: var(--font-mono);
  font-size: 8px;
  color: var(--fg-dim);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.frame-newsletter .nl-head { padding: 6px 8px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; color: var(--accent); }
.frame-newsletter .nl-row { padding: 6px 8px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; }
.frame-newsletter .nl-row:last-child { border: 0; }
.frame-newsletter .nl-row .num { color: var(--accent); }

/* --- Phase timeline (chapter 7) --- */
.phase {
  position: relative;
  padding: 28px 0 28px 32px;
  border-left: 1px solid var(--line);
  margin-left: 6px;
}

.phase::before {
  content: "";
  position: absolute;
  left: -5px;
  top: 36px;
  width: 9px;
  height: 9px;
  background: var(--bg);
  border: 1px solid var(--accent);
  box-shadow: 0 0 12px var(--accent-glow);
}

.phase .ph-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 12px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

.phase .ph-id { color: var(--accent); }
.phase .ph-time { color: var(--fg-faint); }

.phase h3 {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: 20px;
  margin: 0 0 10px;
  letter-spacing: 0.02em;
}

.phase .ph-line {
  font-family: var(--font-serif);
  font-weight: 300;
  font-size: 14px;
  color: var(--fg-dim);
  line-height: 1.7;
  margin-bottom: 10px;
}

.phase .ph-line em {
  font-style: normal;
  color: var(--accent);
}

.phase .ph-meta {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--fg-faint);
  text-transform: uppercase;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px dashed var(--line);
}

.phase .ph-meta span { color: var(--accent); }

/* --- Atlas map (final scene) --- */
.atlas-canvas-wrap {
  position: relative;
  margin: 36px auto;
  width: 100%;
  max-width: 380px;
  aspect-ratio: 1 / 1;
}

.atlas-canvas-wrap canvas {
  width: 100%;
  height: 100%;
  display: block;
}

.atlas-label-tl,
.atlas-label-tr,
.atlas-label-bl,
.atlas-label-br {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--fg-faint);
  text-transform: uppercase;
}
.atlas-label-tl { top: 0; left: 0; }
.atlas-label-tr { top: 0; right: 0; }
.atlas-label-bl { bottom: 0; left: 0; }
.atlas-label-br { bottom: 0; right: 0; }

.atlas-center-text {
  text-align: center;
  margin-top: 16px;
}

.atlas-center-text .en {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.4em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.atlas-center-text .cn {
  font-family: var(--font-serif);
  font-weight: 400;
  font-size: 22px;
  letter-spacing: 0.06em;
}

/* --- Closing / CTA --- */
.scene-closing {
  text-align: center;
  align-items: center;
}

.closing-quote {
  font-family: var(--font-serif);
  font-weight: 300;
  font-size: 22px;
  line-height: 1.8;
  letter-spacing: 0.04em;
  margin: 28px 0;
  text-wrap: balance;
}

.closing-quote em {
  font-style: normal;
  color: var(--accent);
  font-weight: 400;
}

.closing-en {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.28em;
  color: var(--fg-dim);
  text-transform: uppercase;
  margin: 24px 0;
  line-height: 1.8;
}

.cta-card {
  border: 1px solid var(--accent);
  padding: 28px 24px;
  margin: 36px auto 24px;
  max-width: 360px;
  background: linear-gradient(180deg, rgba(123,158,255,0.06), rgba(0,0,0,0.7));
  position: relative;
}
.cta-card::before,
.cta-card::after {
  content: "";
  position: absolute;
  width: 16px;
  height: 16px;
  border: 1px solid var(--accent);
}
.cta-card::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
.cta-card::after { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

.cta-card .label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
}

.cta-card .handle {
  font-family: var(--font-mono);
  font-size: 18px;
  letter-spacing: 0.08em;
  color: var(--fg);
  margin-bottom: 12px;
  word-break: break-all;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}
.cta-card .copy-btn {
  appearance: none;
  -webkit-appearance: none;
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  padding: 6px 12px;
  cursor: pointer;
  transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
  display: inline-flex;
  align-items: center;

.cta-card .copy-btn:hover, .cta-card .copy-btn:active {

.cta-card .copy-btn.copied {

.cta-card .hint {
  font-family: var(--font-serif);
  font-size: 13px;
  color: var(--fg-dim);
  line-height: 1.7;
}

.colophon {
  margin-top: 60px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--fg-faint);

/* --- Section title slate (acts as chapter break) --- */
.slate {

.slate .ch-id {

  align-items: center;

  width: 32px;

  font-size: clamp(40px, 11vw, 64px);

  letter-spacing: 0.04em;
  margin: 0 0 18px;
  text-wrap: balance;

.slate .en {

  font-size: 11px;
  letter-spacing: 0.28em;
  color: var(--fg-dim);

.tweaks-panel-host { font-family: var(--font-mono) !important; }

@media (min-width: 720px) {

  <script>
/* Persistent starfield + atlas convergence canvas */
(function () {
  const STAR_COUNT_BASE = 140;

  const cvs = document.getElementById('bg-stars');
  const ctx = cvs.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  let W = 0, H = 0;
  let stars = [];
  let density = 1;

  function resize() {
    W = cvs.clientWidth = window.innerWidth;
    H = cvs.clientHeight = window.innerHeight;
    cvs.width = W * dpr;
    cvs.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    seed();
  }

  function seed() {
    const N = Math.round(STAR_COUNT_BASE * density);
    stars = new Array(N).fill(0).map(() => ({
      x: Math.random() * W,
      y: Math.random() * H,
      z: Math.random() * 0.9 + 0.1, // depth
      r: Math.random() * 1.2 + 0.2,
      tw: Math.random() * Math.PI * 2,
      tws: 0.4 + Math.random() * 1.4,
      hue: Math.random() < 0.15 ? 'a' : 'w' // accent vs white
    }));
  }

  let scrollY = 0;
  let scrollVel = 0;
  let lastScroll = 0;
  window.addEventListener('scroll', () => {
    scrollY = window.scrollY;
    scrollVel = scrollY - lastScroll;
    lastScroll = scrollY;
  }, { passive: true });

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    const baseY = -scrollY * 0.06; // gentle parallax
    const drift = (t * 0.000008);
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      // drift slowly across the sky
      s.x += Math.sin(drift + i) * 0.02 * s.z;
      // parallax driven by scroll velocity (depth)
      let y = s.y + baseY * s.z * 4;
      // wrap
      y = ((y % H) + H) % H;
      const tw = 0.55 + 0.45 * Math.sin(t * 0.001 * s.tws + s.tw);
      const a = tw * (0.35 + 0.65 * s.z);
      if (s.hue === 'a') {
        ctx.fillStyle = `rgba(123, 158, 255, ${a})`;
      } else {
        ctx.fillStyle = `rgba(244, 245, 251, ${a})`;
      }
      ctx.beginPath();
      ctx.arc(s.x, y, s.r * (0.6 + s.z), 0, Math.PI * 2);
      ctx.fill();
      // glow for the brightest
      if (s.z > 0.85 && s.hue === 'a') {
        ctx.fillStyle = `rgba(123, 158, 255, ${a * 0.18})`;
        ctx.beginPath();
        ctx.arc(s.x, y, s.r * 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);

  window.__atlas = window.__atlas || {};
  window.__atlas.setStarDensity = function (d) {
    density = Math.max(0.1, Math.min(2.5, d));
    seed();
  };
})();

// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* ----- Reveal-on-scroll hook ----- */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal, .fade-only, .blur-in, .typeon');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {

    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

/* ----- Chapter 8: Atlas 地图 / 结尾 ----- */
function AtlasMap() {
  const ref = React.useRef(null);
  const inView = React.useRef(false);

  React.useEffect(() => {
    const cvs = ref.current;
    if (!cvs) return;
    const ctx = cvs.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    function size() {
      const rect = cvs.getBoundingClientRect();
      cvs.width = rect.width * dpr;
      cvs.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    size();

    const W = () => cvs.getBoundingClientRect().width;
    const H = () => cvs.getBoundingClientRect().height;

    // generate point cloud arranged into "atlas map" silhouette (a circle with constellation lines)
    const N = 90;
    const points = [];
    for (let i = 0; i < N; i++) {
      const angle = (i / N) * Math.PI * 2;
      const radius = 0.32 + Math.random() * 0.08;
      // perturb to look organic
      const cx = 0.5 + Math.cos(angle) * radius + (Math.random() - 0.5) * 0.04;
      const cy = 0.5 + Math.sin(angle) * radius + (Math.random() - 0.5) * 0.04;
      // start from random scattered position
      points.push({
        sx: Math.random(),
        sy: Math.random(),
        tx: cx,
        ty: cy,
        x: Math.random(),
        y: Math.random(),
        delay: Math.random() * 0.5,
        connected: false,
      });
    }
    // add a few inner points to fill the constellation
    for (let i = 0; i < 24; i++) {
      const r = Math.random() * 0.28;
      const a = Math.random() * Math.PI * 2;
      points.push({
        sx: Math.random(),
        sy: Math.random(),
        tx: 0.5 + Math.cos(a) * r,
        ty: 0.5 + Math.sin(a) * r,
        x: Math.random(),
        y: Math.random(),
        delay: 0.2 + Math.random() * 0.6,
      });
    }

    let progress = 0;

    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { inView.current = e.isIntersecting; });
    }, { threshold: 0.3 });
    io.observe(cvs);

    function ease(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

    function draw() {
      const w = W(), h = H();
      ctx.clearRect(0, 0, w, h);

      if (inView.current) progress = Math.min(1, progress + 0.005);

      // draw outer ring (compass)
      ctx.strokeStyle = 'rgba(123, 158, 255, 0.18)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(w / 2, h / 2, Math.min(w, h) * 0.42, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(w / 2, h / 2, Math.min(w, h) * 0.32, 0, Math.PI * 2);
      ctx.stroke();

      // crosshairs
      ctx.strokeStyle = 'rgba(123, 158, 255, 0.12)';
      ctx.beginPath();
      ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2);
      ctx.moveTo(w / 2, 0); ctx.lineTo(w / 2, h);
      ctx.stroke();

      // points: lerp from scattered to target
      points.forEach(p => {
        const local = Math.max(0, Math.min(1, (progress - p.delay) / (1 - p.delay)));
        const t = ease(local);
        p.x = p.sx + (p.tx - p.sx) * t;
        p.y = p.sy + (p.ty - p.sy) * t;
      });

      // draw connecting lines once mostly converged
      if (progress > 0.6) {
        const conn = Math.min(1, (progress - 0.6) / 0.4);
        ctx.strokeStyle = `rgba(123, 158, 255, ${0.18 * conn})`;
        ctx.lineWidth = 0.6;
        // connect points within proximity
        for (let i = 0; i < points.length; i++) {
          for (let j = i + 1; j < points.length; j++) {
            const a = points[i], b = points[j];
            const dx = (a.x - b.x) * w, dy = (a.y - b.y) * h;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 50) {
              ctx.beginPath();
              ctx.moveTo(a.x * w, a.y * h);
              ctx.lineTo(b.x * w, b.y * h);
              ctx.stroke();
            }
          }
        }
      }

      // points
      points.forEach((p, i) => {
        const local = Math.max(0, Math.min(1, (progress - p.delay) / (1 - p.delay)));
        const r = 1.2 + local * 1.0;
        const a = 0.4 + local * 0.5;
        ctx.fillStyle = `rgba(123, 158, 255, ${a})`;
        ctx.beginPath();
        ctx.arc(p.x * w, p.y * h, r, 0, Math.PI * 2);
        ctx.fill();
        if (local > 0.9 && i % 4 === 0) {
          ctx.fillStyle = `rgba(123, 158, 255, 0.12)`;
          ctx.beginPath();
          ctx.arc(p.x * w, p.y * h, 6, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      // center mark
      if (progress > 0.85) {
        const a = (progress - 0.85) / 0.15;
        ctx.fillStyle = `rgba(244, 245, 251, ${a})`;
        ctx.beginPath();
        ctx.arc(w / 2, h / 2, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = `rgba(123, 158, 255, ${a * 0.6})`;
        ctx.beginPath();
        ctx.arc(w / 2, h / 2, 8, 0, Math.PI * 2);
        ctx.stroke();
      }

      requestAnimationFrame(draw);
    }
    draw();

    window.addEventListener('resize', size);
    return () => {
      window.removeEventListener('resize', size);
      io.disconnect();
    };
  }, []);

  return (
    <div className="atlas-canvas-wrap reveal">
      <div className="atlas-label-tl">N · 41.0°</div>
      <div className="atlas-label-tr">FIRST COORDINATE</div>
      <div className="atlas-label-bl">JOSH · 2026</div>
      <div className="atlas-label-br">E · 116.0°</div>
      <canvas ref={ref}></canvas>
    </div>
  );
}

  <script type="text/babel">
/* global React, ReactDOM, useReveal, Hero, Slate, Scene, ChNaming, ChMoments, ChMarket, ChDefinition, ChWhyNow, ChUsers, ChProductMoments, ChBusiness, ChClosing, useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakSlider, TweakToggle, TweakColor */
const { useEffect, useState, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#7B9EFF",
  "fontScale": 100,
  "starDensity": 1,
  "showLetterbox": false,
  "showHud": true,
  "animStyle": "cinematic"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [chapter, setChapter] = useState({ id: '00', title: '开场' });
  const [progress, setProgress] = useState(0);
  const [tc, setTc] = useState('00:00:00:00');

  useReveal();

  // apply tweak vars
  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--accent', tweaks.accent);
    r.style.setProperty('--accent-soft', tweaks.accent + '2e');
    r.style.setProperty('--accent-glow', tweaks.accent + '8c');
    r.style.fontSize = `${tweaks.fontScale}%`;
    if (window.__atlas?.setStarDensity) window.__atlas.setStarDensity(tweaks.starDensity);
    document.body.classList.toggle('letterboxed', !!tweaks.showLetterbox);
    document.body.classList.toggle('no-hud', !tweaks.showHud);
  }, [tweaks]);

  // chapter detection + progress + timecode
  useEffect(() => {
    let raf;
    const update = () => {
      const all = document.querySelectorAll('[data-chapter]');
      const mid = window.innerHeight * 0.45;
      let active = null;
      all.forEach((el) => {
        const r = el.getBoundingClientRect();
        if (r.top <= mid && r.bottom >= 0) active = el;
      });
      if (active) {
        const id = active.getAttribute('data-chapter');
        const t = active.getAttribute('data-title');
        setChapter({ id, title: t });
      }
      const max = document.documentElement.scrollHeight - window.innerHeight;
      const p = Math.max(0, Math.min(1, window.scrollY / Math.max(1, max)));
      setProgress(p);
      // timecode like a film
      const total = 600; // 10 minutes virtual film
      const sec = p * total;
      const hh = Math.floor(sec / 3600);
      const mm = Math.floor((sec % 3600) / 60);
      const ss = Math.floor(sec % 60);
      const ff = Math.floor((sec - Math.floor(sec)) * 24);
      setTc(`${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}:${String(ss).padStart(2, '0')}:${String(ff).padStart(2, '0')}`);
    };
    const onScroll = () => { cancelAnimationFrame(raf); raf = requestAnimationFrame(update); };
    window.addEventListener('scroll', onScroll, { passive: true });
    update();
    return () => { window.removeEventListener('scroll', onScroll); cancelAnimationFrame(raf); };
  }, []);

  return (
    <>
      {tweaks.showHud && (
        <div className="hud-top">
          <div className="left">
            <span className="hud-dot"></span>
            <span>REC · ATLAS</span>
          </div>
          <div className="right">
            <span>{tc}</span>
          </div>
        </div>
      )}

      <div className="stage">
        <Hero />
        <ChNaming />
        <ChMoments />
        <ChMarket />
        <ChDefinition />
        <ChWhyNow />
        <ChUsers />
        <ChProductMoments />
        <ChBusiness />
        <ChClosing />
      </div>

      <div className="subtitle-bar">
        <span className="ch-num">CH · {chapter.id}</span>
        <span className="ch-title">{chapter.title}</span>
      </div>
      <div className="progress-rail">
        <div className="progress-fill" style={{ width: `${progress * 100}%` }}></div>
      </div>

      {tweaks.showLetterbox && <>
        <div className="letterbox-top"></div>
        <div className="letterbox-bottom"></div>
      </>}

      <TweaksPanel title="Tweaks · ATLAS">
        <TweakSection label="VISUAL" />
        <TweakColor label="Accent" value={tweaks.accent}
          onChange={(v) => setTweak('accent', v)} />
        <TweakSlider label="Font scale" value={tweaks.fontScale}
          min={80} max={130} step={5} unit="%"
          onChange={(v) => setTweak('fontScale', v)} />
        <TweakSlider label="Star density" value={tweaks.starDensity}
          min={0.2} max={2.5} step={0.1}
          onChange={(v) => setTweak('starDensity', v)} />
        <TweakSection label="CINEMA" />
        <TweakToggle label="Letterbox bars" value={tweaks.showLetterbox}
          onChange={(v) => setTweak('showLetterbox', v)} />
        <TweakToggle label="Top HUD (timecode)" value={tweaks.showHud}
          onChange={(v) => setTweak('showHud', v)} />
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>

</body>
